name: 2 - Create Release Tag

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version label e.g. v1.0.0 (leave blank to auto-generate)'
        required: false
        type: string
        default: ''

jobs:
  create-release:
    name: Create Release Tag and GitHub Release
    runs-on: ubuntu-latest
    environment: release-approval
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Last Release Info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "LAST RELEASE INFO"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          LAST_TAG=$(git tag --sort=-creatordate | grep "^release-" | head -n 1 || true)
          if [ -z "$LAST_TAG" ]; then
            echo "No previous release tags found - this will be the first release"
            echo "LAST_TAG=" >> $GITHUB_ENV
          else
            LAST_TAG_DATE=$(git log -1 --format="%ci" "${LAST_TAG}")
            LAST_TAG_SHA=$(git rev-list -n 1 "${LAST_TAG}")
            LAST_TAG_AUTHOR=$(git log -1 --format="%an" "${LAST_TAG}")
            echo "Tag    : ${LAST_TAG}"
            echo "SHA    : ${LAST_TAG_SHA}"
            echo "Date   : ${LAST_TAG_DATE}"
            echo "Author : ${LAST_TAG_AUTHOR}"
            echo "LAST_TAG=${LAST_TAG}" >> $GITHUB_ENV
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Show All Existing Release Tags
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "ALL RELEASE TAGS (newest to oldest)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ALL_TAGS=$(git tag --sort=-creatordate | grep "^release-" || true)
          if [ -z "$ALL_TAGS" ]; then
            echo "No release tags yet"
          else
            COUNT=1
            echo "$ALL_TAGS" | while read tag; do
              TAG_DATE=$(git log -1 --format="%ci" "${tag}")
              echo "${COUNT}. ${tag}  [${TAG_DATE}]"
              COUNT=$((COUNT + 1))
            done
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Set New Release Tag Name
        run: |
          SHA=$(git rev-parse --short HEAD)
          RUN="${GITHUB_RUN_NUMBER}"
          INPUT_VER="${{ inputs.release_version }}"
          if [ -n "$INPUT_VER" ]; then
            NEW_TAG="release-${INPUT_VER}-${SHA}"
          else
            NEW_TAG="release-${SHA}-${RUN}"
          fi
          echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "NEW RELEASE TAG WILL BE: ${NEW_TAG}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Generate Changelog
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "CHANGELOG (commits since last release)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          LAST="${{ env.LAST_TAG }}"
          if [ -n "$LAST" ]; then
            CHANGES=$(git log "${LAST}..HEAD" --pretty=format:"- %s (%an)" --no-merges || true)
          else
            CHANGES=$(git log --pretty=format:"- %s (%an)" --no-merges -20 || true)
          fi
          if [ -z "$CHANGES" ]; then
            CHANGES="- No new commits since last release"
          fi
          echo "$CHANGES"
          echo "CHANGES<<EOF" >> $GITHUB_ENV
          echo "$CHANGES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Create and Push Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ env.NEW_TAG }}" -m "Release ${{ env.NEW_TAG }} approved by ${{ github.actor }}"
          git push origin "${{ env.NEW_TAG }}"
          echo "Tag pushed: ${{ env.NEW_TAG }}"

      - name: Write Release Notes to File
        run: |
          LAST="${{ env.LAST_TAG }}"
          if [ -n "$LAST" ]; then
            PREV_LINE="Previous Release: ${LAST}"
          else
            PREV_LINE="Previous Release: None (this is the first release)"
          fi
          printf '%s\n' "## Release ${{ env.NEW_TAG }}" > /tmp/release-notes.md
          printf '%s\n' "" >> /tmp/release-notes.md
          printf '%s\n' "**Created by:** ${{ github.actor }}" >> /tmp/release-notes.md
          printf '%s\n' "**Commit:** ${{ github.sha }}" >> /tmp/release-notes.md
          printf '%s\n' "**Branch:** main" >> /tmp/release-notes.md
          printf '%s\n' "**${PREV_LINE}**" >> /tmp/release-notes.md
          printf '%s\n' "" >> /tmp/release-notes.md
          printf '%s\n' "---" >> /tmp/release-notes.md
          printf '%s\n' "" >> /tmp/release-notes.md
          printf '%s\n' "## Changes since last release" >> /tmp/release-notes.md
          printf '%s\n' "${{ env.CHANGES }}" >> /tmp/release-notes.md
          printf '%s\n' "" >> /tmp/release-notes.md
          printf '%s\n' "---" >> /tmp/release-notes.md
          printf '%s\n' "" >> /tmp/release-notes.md
          printf '%s\n' "## Deploy to Production" >> /tmp/release-notes.md
          printf '%s\n' "Go to: Actions > 3 - PROD Deploy (Manual) > Run workflow" >> /tmp/release-notes.md
          printf '%s\n' "Select tag: ${{ env.NEW_TAG }}" >> /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.NEW_TAG }}" \
            --title "Release ${{ env.NEW_TAG }}" \
            --notes-file /tmp/release-notes.md \
            --latest
          echo "GitHub Release created: ${{ env.NEW_TAG }}"
          echo "View at: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${{ env.NEW_TAG }}"

      # ── KEY STEP: rewrite workflow 3 dropdown with real tag names ──
      - name: Update Prod Deploy Workflow Dropdown with Real Tag Names
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull latest main to avoid conflicts
          git fetch origin main
          git checkout main
          git pull origin main

          # Collect latest 5 release tags newest first (including the one just created)
          ALL_TAGS=$(git tag --sort=-creatordate | grep "^release-" | head -n 5 || true)

          if [ -z "$ALL_TAGS" ]; then
            echo "No tags found - skipping dropdown update"
            exit 0
          fi

          # Build the options block with real tag names
          OPTIONS_BLOCK=""
          while read tag; do
            if [ -n "$tag" ]; then
              OPTIONS_BLOCK="${OPTIONS_BLOCK}          - ${tag}\n"
            fi
          done <<< "$ALL_TAGS"

          # Get the first (latest) tag as default
          DEFAULT_TAG=$(echo "$ALL_TAGS" | head -n 1)

          echo "Updating dropdown with tags:"
          echo "$ALL_TAGS"

          # Use python to safely rewrite the options block in the YAML file
          python3 << PYEOF
          import re

          with open('.github/workflows/3-prod-deploy.yml', 'r') as f:
              content = f.read()

          # Build new options block
          tags = """$ALL_TAGS""".strip().split('\n')
          tags = [t.strip() for t in tags if t.strip()]

          options_lines = '\n'.join(f'          - {t}' for t in tags)
          default_tag = tags[0] if tags else ''

          # Replace the options block between 'options:' and the next key
          new_options = f'        options:\n{options_lines}'
          content = re.sub(
              r'        options:.*?(?=\n        [a-z]|\n      [a-z])',
              new_options,
              content,
              flags=re.DOTALL
          )

          # Replace default value
          content = re.sub(
              r"(        default: ').*?(')",
              f"\\g<1>{default_tag}\\g<2>",
              content
          )

          with open('.github/workflows/3-prod-deploy.yml', 'w') as f:
              f.write(content)

          print(f"Dropdown updated with {len(tags)} tags")
          print(f"Default set to: {default_tag}")
          PYEOF

          # Commit and push the updated workflow file back to main
          git add .github/workflows/3-prod-deploy.yml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update prod deploy dropdown with latest release tags [skip ci]"
          git push origin main

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Workflow 3 dropdown updated successfully"
          echo "Next prod deploy will show real tag names"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
