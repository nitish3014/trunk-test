name: 3 - PROD Deploy (Manual)

# ─────────────────────────────────────────────────────────────────
# The dropdown below is AUTO-UPDATED by workflow 2 every time
# a new release tag is created. You will always see the 5 most
# recent real tag names to choose from.
#
# HOW TO USE:
# 1. Run workflow 2 to create a release tag first
# 2. Come here → Run workflow → pick tag from dropdown
# 3. Type "deploy-prod" to confirm
# 4. Approve in the production environment gate
# ─────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Select release tag to deploy to PROD'
        required: true
        type: choice
        default: 'no-releases-yet'
        options:
          - no-releases-yet
      confirm_deployment:
        description: 'Type "deploy-prod" to confirm production deployment'
        required: true
        type: string

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Validate selected tag
  # ─────────────────────────────────────────────────────────────────
  validate-tag:
    name: Validate Selected Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show All Available Release Tags
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "ALL RELEASE TAGS (newest to oldest)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ALL_TAGS=$(git tag --sort=-creatordate | grep "^release-" || true)
          if [ -z "$ALL_TAGS" ]; then
            echo "ERROR: No release tags found - run workflow 2 first"
          else
            COUNT=1
            echo "$ALL_TAGS" | while read tag; do
              TAG_DATE=$(git log -1 --format="%ci" "${tag}")
              MARKER=""
              if [ "$tag" = "${{ inputs.release_tag }}" ]; then
                MARKER="  <── SELECTED FOR PROD DEPLOY"
              fi
              echo "${COUNT}. ${tag}  [${TAG_DATE}]${MARKER}"
              COUNT=$((COUNT + 1))
            done
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Validate Tag is Not Placeholder
        run: |
          if [ "${{ inputs.release_tag }}" = "no-releases-yet" ]; then
            echo "ERROR: No real release tag selected"
            echo "Please run workflow 2 to create a release tag first"
            exit 1
          fi
          echo "Selected tag: ${{ inputs.release_tag }}"

      - name: Validate Tag Exists in Repo
        run: |
          TAG="${{ inputs.release_tag }}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag exists and is valid: ${TAG}"
          else
            echo "ERROR: Tag '${TAG}' does not exist in repository"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Deploy to PROD with manual approval gate
  # ─────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy Production - ${{ inputs.release_tag }}
    needs: validate-tag
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION:       us-east-1
      EKS_CLUSTER_NAME: rtb-prod-eks
      DEPLOYMENT_NAME:  rtb-prod-auth-service
      K8S_NAMESPACE:    default
      BASTION_USER:     ubuntu
      S3_BUCKET_DEV:    rtb-dev-artifact
      S3_BUCKET_PROD:   rtb-prod-artifact
      S3_ARTIFACT_KEY:  rtb-core-0.0.1-SNAPSHOT.jar
      RELEASE_TAG:      ${{ inputs.release_tag }}

    steps:
      - name: Validate Confirmation Text
        run: |
          if [ "${{ inputs.confirm_deployment }}" != "deploy-prod" ]; then
            echo "ERROR: Confirmation failed"
            echo "You typed : ${{ inputs.confirm_deployment }}"
            echo "Expected  : deploy-prod"
            exit 1
          fi
          echo "Confirmed by: ${{ github.actor }}"

      - name: Set Version from Tag
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          VERSION="${TAG#release-}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Tag     : ${TAG}"
          echo "Version : ${VERSION}"

      - name: Checkout Code at Release Tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Show Deployment Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "PRODUCTION DEPLOYMENT SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Release tag    : ${{ env.RELEASE_TAG }}"
          echo "  Version        : ${{ env.VERSION }}"
          echo "  Commit SHA     : $(git rev-parse HEAD)"
          echo "  Commit message : $(git log -1 --pretty=format:'%s')"
          echo "  Triggered by   : ${{ github.actor }}"
          echo "  Target cluster : ${{ env.EKS_CLUSTER_NAME }}"
          echo "  Namespace      : ${{ env.K8S_NAMESPACE }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Notify PROD Deploy Start
        run: |
          echo "Slack/GChat - PRODUCTION deploy started"
          echo "  Tag         : ${{ env.RELEASE_TAG }}"
          echo "  Version     : ${{ env.VERSION }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "  URL         : ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Configure AWS Credentials PROD Account
        run: echo "Assuming OIDC role in PROD AWS account..."

      - name: Promote JAR Artifact DEV S3 to PROD S3
        run: |
          echo "Promoting artifact:"
          echo "  FROM : s3://${{ env.S3_BUCKET_DEV }}/${{ env.S3_ARTIFACT_KEY }}"
          echo "  TO   : s3://${{ env.S3_BUCKET_PROD }}/${{ env.S3_ARTIFACT_KEY }}"

      - name: Fetch Promoted JAR from PROD S3
        run: echo "Fetching ${{ env.S3_ARTIFACT_KEY }} from s3://${{ env.S3_BUCKET_PROD }}/..."

      - name: Fetch Secrets from Secrets Manager PROD
        run: echo "Fetching rtb-prod/db | rtb-prod/aws | rtb-prod/auth-service..."

      - name: Fetch Kubeconfig via PROD Bastion
        run: echo "SSH into PROD bastion - fetching kubeconfig for ${{ env.EKS_CLUSTER_NAME }}..."

      - name: Sync Secrets to Kubernetes PROD
        run: echo "kubectl apply secrets to ${{ env.K8S_NAMESPACE }} on ${{ env.EKS_CLUSTER_NAME }}..."

      - name: Build Docker Image on PROD Bastion
        run: |
          echo "Building Docker image on PROD bastion"
          echo "  JAR      : ${{ env.S3_ARTIFACT_KEY }} promoted from DEV S3"
          echo "  Image tag: ${{ env.VERSION }}"

      - name: Push Docker Image to PROD ECR
        run: echo "Pushing to PROD ECR - ${{ env.DEPLOYMENT_NAME }}:${{ env.VERSION }}"

      - name: Deploy to PROD EKS
        run: |
          echo "kubectl set image - ${{ env.DEPLOYMENT_NAME }}:${{ env.VERSION }}"
          echo "  Cluster  : ${{ env.EKS_CLUSTER_NAME }}"
          echo "  Namespace: ${{ env.K8S_NAMESPACE }}"

      - name: Verify PROD Rollout
        run: echo "kubectl rollout status - ${{ env.EKS_CLUSTER_NAME }} timeout 300s..."

      - name: Clean Up Old PROD ECR Images
        run: echo "Pruning PROD ECR - retaining latest 5 images..."

      - name: Deployment Complete
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "PRODUCTION DEPLOYMENT COMPLETE"
          echo "  Release tag : ${{ env.RELEASE_TAG }}"
          echo "  Version     : ${{ env.VERSION }}"
          echo "  Cluster     : ${{ env.EKS_CLUSTER_NAME }}"
          echo "  Deployed by : ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Notify PROD Deploy Result
        if: always()
        run: |
          STATUS=$([[ "${{ job.status }}" == "success" ]] && echo "Succeeded" || echo "Failed")
          echo "Slack/GChat - PRODUCTION deploy ${STATUS}"
          echo "  Tag         : ${{ env.RELEASE_TAG }}"
          echo "  Version     : ${{ env.VERSION }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "  URL         : ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
