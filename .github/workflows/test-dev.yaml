name: 1 - DEV CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : CI - Build & Test
  # ─────────────────────────────────────────────
  ci:
    name: "CI: Build & Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Version
        run: |
          SHA=$(git rev-parse --short HEAD)
          VER="${SHA}-${GITHUB_RUN_NUMBER}"
          echo "VERSION=${VER}" >> $GITHUB_ENV
          echo "🏷️ Version: ${VER}"

      - name: Install Dependencies
        run: echo "📦 Installing dependencies..."

      - name: Run Unit Tests
        run: echo "🧪 Running unit tests..."

      - name: Run Code Quality / Lint
        run: echo "🔍 Running lint and code quality checks..."

      - name: Build Artifact
        run: echo "🔨 Building JAR artifact..."

      - name: Upload Artifact to DEV S3
        run: echo "📤 Uploading artifact to s3://rtb-dev-artifact/..."

  # ─────────────────────────────────────────────
  # JOB 2 : Deploy to DEV
  # ─────────────────────────────────────────────
  deploy-dev:
    name: "Deploy: Development"
    needs: ci
    runs-on: ubuntu-latest
    environment: development
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Version
        id: version
        run: |
          SHA=$(git rev-parse --short HEAD)
          VER="${SHA}-${GITHUB_RUN_NUMBER}"
          echo "VERSION=${VER}" >> $GITHUB_ENV
          echo "VERSION=${VER}" >> $GITHUB_OUTPUT
          echo "🏷️ Version: ${VER}"

      - name: Notify DEV Deploy Start
        run: |
          echo "📣 Slack/GChat — DEV deploy started"
          echo "    Repo   : ${GITHUB_REPOSITORY}"
          echo "    Version: ${{ env.VERSION }}"
          echo "    Commit : $(git log -1 --pretty=format:'%s')"
          echo "    By     : $(git log -1 --pretty=format:'%an')"

      - name: Configure AWS Credentials (DEV Account)
        run: echo "🔐 Assuming OIDC role → DEV AWS account..."

      - name: Fetch JAR from DEV S3
        run: echo "📥 Fetching rtb-core-0.0.1-SNAPSHOT.jar from s3://rtb-dev-artifact/..."

      - name: Fetch Secrets from Secrets Manager (DEV)
        run: echo "🔑 Fetching rtb-dev/db | rtb-dev/aws | rtb-dev/auth-service..."

      - name: Fetch Kubeconfig via DEV Bastion
        run: echo "🖥️ SSH → DEV bastion | fetching kubeconfig for rtb-eks-dev..."

      - name: Sync Secrets to Kubernetes (DEV)
        run: echo "📋 kubectl apply secrets → default namespace | rtb-eks-dev..."

      - name: Build Docker Image on DEV Bastion
        run: echo "🐳 docker build on DEV bastion → rtb-dev-auth-service:${{ env.VERSION }}..."

      - name: Push Docker Image to DEV ECR
        run: echo "📤 Pushing → DEV ECR | rtb-dev-auth-service:${{ env.VERSION }}"

      - name: Deploy to DEV EKS
        run: echo "🚀 kubectl set image → rtb-dev-auth-service:${{ env.VERSION }} on rtb-eks-dev..."

      - name: Verify DEV Rollout
        run: echo "✅ kubectl rollout status → rtb-eks-dev | timeout 300s..."

      - name: Clean Up Old DEV ECR Images (keep 5)
        run: echo "🧹 Pruning DEV ECR → retaining latest 5 images..."

      - name: Notify DEV Deploy Result
        if: always()
        run: |
          STATUS=$([[ "${{ job.status }}" == "success" ]] && echo "✅ Succeeded" || echo "❌ Failed")
          echo "📣 Slack/GChat — DEV deploy ${STATUS}"
          echo "    Version: ${{ env.VERSION }}"
          echo "    URL    : ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
